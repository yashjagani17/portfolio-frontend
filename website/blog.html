<html lang="en">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="assets/styles.css">
</head>
<body>

  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>

    <li><a href="blog.html" class="active">Blog</a></li>

  </ul>

<div class="section-inner">

  <div class="page-hero">
    <div class="page-hero-label">Writing</div>
    <h1>Blog</h1>
    <p class="page-hero-desc">Notes on cloud infrastructure, DevSecOps, and things I've learnt building on AWS and GCP. Updated as I build.</p>
  </div>

  <div class="blog-page-list" id="blog-page-list">
    <!-- Populated by blog-data.js -->
    <div style="padding:2rem;color:var(--muted2);font-size:13px">Loading posts<span class="loading"></span></div>
  </div>

</div>

<footer>
  <div class="footer-logo">YJ<span>.</span></div>
  <div>Yash Jagani &middot; Cloud &amp; DevOps Engineer</div>
  <div style="margin-top:6px"><a href="index.html" style="color:var(--accent)">← Back to portfolio</a></div>
</footer>

<script>
// ── SCROLL REVEAL
const obs = new IntersectionObserver(es => es.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); }), { threshold: 0.08 });

function renderBlog(posts) {
  const list = document.getElementById('blog-page-list');
  list.innerHTML = posts.map((p, i) => `
    <article class="blog-post-card reveal" id="${p.id}" style="transition-delay:${i * 0.08}s">
      <div class="bp-header">
        <div class="bp-meta">
          <span class="bp-date">${p.date}</span>
          <span class="t-dim" style="font-size:11px">·</span>
          <span class="bp-read">${p.readTime}</span>
        </div>
        <div class="bp-title">${p.title}</div>
        <div class="bp-excerpt">${p.excerpt}</div>
      </div>
      <div class="post-body" id="body-${p.id}">${p.body}</div>
      <div class="bp-footer">
        <div class="bp-tags"><span class="tag">${p.tag}</span></div>
        <button class="bp-more" style="background:none;border:none;cursor:pointer;font-family:var(--font-mono);color:var(--accent);font-size:12px;letter-spacing:0.06em">
          Read more ↓
        </button>
      </div>
    </article>`).join('');

  list.querySelectorAll('.reveal').forEach(el => obs.observe(el));

  // Auto-open if hash matches
  const hash = window.location.hash.slice(1);
  if (hash) {
    const post = document.getElementById(hash);
    if (post) {
      const body = document.getElementById('body-' + hash);
      const btn  = post.querySelector('.bp-more');
      if (body && btn) { body.classList.add('open'); btn.textContent = 'Collapse ↑'; }
      setTimeout(() => post.scrollIntoView({ behavior: 'smooth', block: 'start' }), 300);
    }
  }
}


const TEXT_TAGS = ['P', 'H3', 'LI', 'CODE', 'PRE', 'STRONG', 'EM', 'A', 'SPAN'];

function isOnText(el) {
  return TEXT_TAGS.includes(el.tagName) || el.closest(TEXT_TAGS.join(','));
}

function openPost(id) {
  const body = document.getElementById('body-' + id);
  const btn  = document.querySelector('#' + id + ' .bp-more');
  if (!body || !btn) return;
  body.classList.add('open');
  btn.textContent = 'Collapse ↑';
}

function closePost(id) {
  const body = document.getElementById('body-' + id);
  const btn  = document.querySelector('#' + id + ' .bp-more');
  if (!body || !btn) return;
  body.classList.remove('open');
  btn.textContent = 'Read more ↓';
}

function closeAllExcept(exceptId) {
  document.querySelectorAll('.post-body.open').forEach(body => {
    const id = body.id.replace('body-', '');
    if (id !== exceptId) closePost(id);
  });
}

let pendingAction = null; // { type: 'open'|'close', id }

document.addEventListener('mousedown', function(e) {
  pendingAction = null;
  const article = e.target.closest('.blog-post-card');

  // Clicked outside every card — queue close all
  if (!article) {
    const openIds = [...document.querySelectorAll('.post-body.open')].map(b => b.id.replace('body-', ''));
    if (openIds.length) pendingAction = { type: 'closeAll', ids: openIds };
    return;
  }

  const id   = article.id;
  const body = document.getElementById('body-' + id);
  const open = body && body.classList.contains('open');

  if (!open) {
    pendingAction = { type: 'open', id };
  } else {
    if (!isOnText(e.target)) {
      pendingAction = { type: 'close', id };
    }
  }
});

document.addEventListener('mouseup', function() {
  if (!pendingAction) return;

  // If user made a text selection, cancel the action entirely
  const sel = window.getSelection();
  if (sel && sel.toString().length > 0) {
    pendingAction = null;
    return;
  }

  const action = pendingAction;
  pendingAction = null;

  if (action.type === 'open') {
    closeAllExcept(action.id);
    openPost(action.id);
  } else if (action.type === 'close') {
    closePost(action.id);
  } else if (action.type === 'closeAll') {
    action.ids.forEach(id => closePost(id));
  }
});

// Load blog data
const s = document.createElement('script');
s.src = 'assets/blog-data.js';
s.onload  = () => { if(window.BLOG_POSTS) renderBlog(window.BLOG_POSTS); };
s.onerror = () => { document.getElementById('blog-page-list').innerHTML = '<p style="color:var(--muted2);padding:2rem">Could not load posts. Make sure blog-data.js is present.</p>'; };
document.head.appendChild(s);
</script>
<script>window.addEventListener("scroll",function(){document.getElementById("scroll-top").classList.toggle("visible",window.scrollY>300);},{passive:true});</script>
<button class="scroll-top" id="scroll-top" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="Back to top">↑</button>
</body>
</html>
